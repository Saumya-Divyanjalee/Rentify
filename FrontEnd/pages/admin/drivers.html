<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rentify Admin — Drivers</title>

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=DM+Sans:wght@400;500;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../admin-css/p-admin.css">

    <style>
        .driver-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--green-light);}
        .driver-avatar-placeholder{width:40px;height:40px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:14px;border:2px solid var(--green-light);}
        .pic-upload-area{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:0.2s;background:#f8fafc;}
        .pic-upload-area:hover{border-color:var(--green);background:var(--green-soft);}
        .pic-preview{width:80px;height:80px;border-radius:50%;object-fit:cover;margin:0 auto 10px;display:block;border:3px solid var(--green-light);}
        .exp-warning{color:#dc2626;font-size:11px;font-weight:600;}
    </style>
</head>
<body>
<div id="sidebar-root"></div>
<main class="main-content">
    <div class="page-header">
        <div><div class="page-title">🧑‍✈️ Drivers</div><div class="page-subtitle">Manage your driver fleet</div></div>
        <button class="btn btn-primary" onclick="openModal()">+ Add Driver</button>
    </div>

    <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
        <div class="search-bar"><span>🔍</span><input id="searchInput" placeholder="Search driver, licence..."></div>
        <select class="form-select" style="max-width:160px" id="filterType">
            <option value="">All Vehicle Types</option>
            <option>Sedan</option><option>SUV</option><option>Mini</option><option>Van</option><option>Luxury</option>
        </select>
        <button class="btn btn-outline" onclick="exportCSV()">⬇ Export CSV</button>
        <button class="btn btn-outline" onclick="exportPDF()">⬇ Export PDF</button>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="card-title">All Drivers</span>
            <span id="countBadge" class="badge badge-green">0 drivers</span>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>#ID</th><th>Profile</th><th>Name</th><th>Phone</th><th>Licence No</th><th>Licence Expiry</th><th>Vehicle Type</th><th>Actions</th></tr></thead>
                <tbody id="driverTable"></tbody>
            </table>
        </div>
    </div>
</main>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="modalTitle">Add Driver</div>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="pic-upload-area" onclick="document.getElementById('picInput').click()">
            <img id="picPreview" class="pic-preview" style="display:none">
            <div id="uploadPlaceholder">
                <div style="font-size:32px">📷</div>
                <div style="font-size:13px;color:var(--text-muted);margin-top:6px">Click to upload profile photo</div>
            </div>
        </div>
        <input type="file" id="picInput" accept="image/*" style="display:none" onchange="handlePic(event)">

        <div class="form-grid" style="margin-top:16px">
            <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="f-name"></div>
            <div class="form-group"><label class="form-label">Phone No</label><input class="form-input" id="f-phone"></div>
            <div class="form-group"><label class="form-label">Licence No</label><input class="form-input" id="f-licence"></div>
            <div class="form-group"><label class="form-label">Licence Expiry Date</label><input class="form-input" type="date" id="f-expiry"></div>
            <div class="form-group"><label class="form-label">Vehicle Type</label>
                <select class="form-select" id="f-vtype"><option>Sedan</option><option>SUV</option><option>Mini</option><option>Van</option><option>Luxury</option></select>
            </div>
            <div class="form-group"><label class="form-label">Status</label>
                <select class="form-select" id="f-status"><option>Active</option><option>Inactive</option><option>On Trip</option></select>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveDriver()">Save Driver</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="../../js/admin-js/p-admin-js.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<script>
    const BASE_URL = 'http://localhost:8081/api/v1/drivers';
    let editId = null;
    let currentPic = '';

    $(document).ready(function() {
        if(typeof getSidebar === 'function') {
            document.getElementById('sidebar-root').innerHTML = getSidebar('drivers');
        }
        renderTable();
    });

    // Helper functions for UI
    const sc = s => s === 'Active' ? 'badge-green' : s === 'On Trip' ? 'badge-yellow' : 'badge-gray';
    function isExpired(d) { return d && new Date(d) < new Date(); }
    function isExpiringSoon(d) {
        if (!d) return false;
        const diff = (new Date(d) - new Date()) / (1000 * 60 * 60 * 24);
        return diff < 90 && diff > 0;
    }

    // --- CRUD OPERATIONS ---

    function renderTable() {
        const query = $('#searchInput').val();
        const vehicleType = $('#filterType').val();

        $.ajax({
            url: BASE_URL,
            method: 'GET',
            data: { query, vehicleType },
            success: function(res) {
                const drivers = res.data;
                $('#countBadge').text(drivers.length + ' drivers');

                let html = '';
                drivers.forEach(d => {
                    html += `
                    <tr>
                      <td><span style="font-family:'Roboto Mono'">D${String(d.id).padStart(3,'0')}</span></td>
                      <td>${d.profilePic ? `<img src="${d.profilePic}" class="driver-avatar">` : `<div class="driver-avatar-placeholder">${d.name[0]}</div>`}</td>
                      <td><strong>${d.name}</strong><br><span class="badge ${sc(d.status)}" style="margin-top:4px">${d.status}</span></td>
                      <td>${d.phone}</td>
                      <td>${d.licenceNo}</td>
                      <td>${d.licenceExpiry || 'N/A'} ${isExpired(d.licenceExpiry) ? '<br><span class="exp-warning">⚠️ EXPIRED</span>' : isExpiringSoon(d.licenceExpiry) ? '<br><span style="color:#f59e0b;font-size:11px;font-weight:600">⚠️ Soon</span>' : ''}</td>
                      <td><span class="badge badge-blue">${d.vehicleType}</span></td>
                      <td style="display:flex;gap:6px">
                        <button class="btn btn-outline btn-sm" onclick="editDriver(${d.id})">✏️</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteDriver(${d.id})">🗑️</button>
                      </td>
                    </tr>`;
                });
                $('#driverTable').html(html);
            }
        });
    }

    function saveDriver() {
        const dto = {
            name: $('#f-name').val(),
            phone: $('#f-phone').val(),
            licenceNo: $('#f-licence').val(),
            licenceExpiry: $('#f-expiry').val(),
            vehicleType: $('#f-vtype').val(),
            status: $('#f-status').val(),
            profilePic: currentPic
        };

        const isEdit = editId !== null;
        $.ajax({
            url: isEdit ? `${BASE_URL}/${editId}` : BASE_URL,
            method: isEdit ? 'PUT' : 'POST',
            contentType: 'application/json',
            data: JSON.stringify(dto),
            success: function() {
                showToast(isEdit ? 'Updated' : 'Added');
                closeModal();
                renderTable();
            },
            error: function(xhr) { showToast(xhr.responseJSON?.message || 'Error', 'error'); }
        });
    }

    function editDriver(id) {
        $.get(`${BASE_URL}/${id}`, function(res) {
            const d = res.data;
            editId = d.id;
            currentPic = d.profilePic || '';
            $('#f-name').val(d.name); $('#f-phone').val(d.phone);
            $('#f-licence').val(d.licenceNo); $('#f-expiry').val(d.licenceExpiry);
            $('#f-vtype').val(d.vehicleType); $('#f-status').val(d.status);

            if (currentPic) {
                $('#picPreview').attr('src', currentPic).show();
                $('#uploadPlaceholder').hide();
            }
            $('#modalTitle').text('Edit Driver');
            openModal(false);
        });
    }

    function deleteDriver(id) {
        if (confirm('Delete this driver?')) {
            $.ajax({
                url: `${BASE_URL}/${id}`,
                method: 'DELETE',
                success: function() { renderTable(); showToast('Deleted', 'error'); }
            });
        }
    }

    // --- EXPORT LOGIC ---

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');

        doc.setFontSize(18);
        doc.text("Rentify - Driver Fleet Report", 14, 20);

        const rows = [];
        $("#driverTable tr").each(function() {
            const row = $(this).find("td");
            if (row.length > 0) {
                rows.push([
                    row.eq(0).text().trim(),
                    row.eq(2).find('strong').text().trim(),
                    row.eq(3).text().trim(),
                    row.eq(4).text().trim(),
                    row.eq(5).text().split('⚠️')[0].trim(),
                    row.eq(6).text().trim(),
                    row.eq(2).find('.badge').text().trim()
                ]);
            }
        });

        doc.autoTable({
            startY: 30,
            head: [['ID', 'Name', 'Phone', 'Licence', 'Expiry', 'Vehicle', 'Status']],
            body: rows,
            headStyles: { fillColor: [34, 197, 94] }
        });

        doc.save("Drivers_Report.pdf");
    }

    function exportCSV() {
        let csv = "ID,Name,Phone,Licence,Expiry,Vehicle,Status\n";
        $("#driverTable tr").each(function() {
            const r = $(this).find("td");
            if(r.length > 0) {
                csv += `${r.eq(0).text()},${r.eq(2).find('strong').text()},${r.eq(3).text()},${r.eq(4).text()},${r.eq(5).text().split('⚠️')[0].trim()},${r.eq(6).text()},${r.eq(2).find('.badge').text()}\n`;
            }
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'drivers.csv'; a.click();
    }

    // --- UI HELPERS ---
    function handlePic(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = ev => {
            currentPic = ev.target.result;
            $('#picPreview').attr('src', currentPic).show();
            $('#uploadPlaceholder').hide();
        };
        reader.readAsDataURL(file);
    }
    function openModal(clear = true) {
        if(clear) {
            editId = null; currentPic = '';
            $('.form-input').val(''); $('#picPreview').hide(); $('#uploadPlaceholder').show();
        }
        $('#modalOverlay').addClass('open');
    }
    function closeModal() { $('#modalOverlay').removeClass('open'); }

    $('#searchInput, #filterType').on('input change', renderTable);
</script>
</body>
</html>
